name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m compileall app main.py app.py generate_and_train.py scripts

      - name: Verify required runtime artifacts exist
        run: |
          test -f model_metadata.json
          test -f accuracy_metrics.json
          test -f Dockerfile
