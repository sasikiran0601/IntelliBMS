{% extends "base.html" %}

{% block title %}Add Battery - IntelliBMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New Battery</h2>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_battery') }}">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Battery Name *</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="battery_type">Battery Type *</label>
                <input type="text" id="battery_type" name="battery_type" value="Li-ion" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="num_cells">Number of Cells *</label>
                <input type="number" id="num_cells" name="num_cells" value="48" required>
            </div>
            <div class="form-group">
                <label for="base_voltage">Base Voltage (V) *</label>
                <input type="number" step="0.01" id="base_voltage" name="base_voltage" value="4.1" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="base_soh">Base SOH (%) *</label>
                <input type="number" step="0.1" id="base_soh" name="base_soh" value="95.0" required>
            </div>
            <div class="form-group">
                <label for="base_temp">Base Temperature (°C) *</label>
                <input type="number" step="0.1" id="base_temp" name="base_temp" value="25.0" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="degradation_rate">Degradation Rate *</label>
                <input type="number" step="0.01" id="degradation_rate" name="degradation_rate" value="0.03" required>
            </div>
            <div class="form-group">
                <label for="fault_probability">Fault Probability *</label>
                <input type="number" step="0.1" id="fault_probability" name="fault_probability" value="0.1" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="capacity_ah">Capacity (Ah)</label>
                <input type="number" step="0.1" id="capacity_ah" name="capacity_ah" value="100.0">
            </div>
            <div class="form-group">
                <label for="max_charge_rate">Max Charge Rate (A)</label>
                <input type="number" step="0.1" id="max_charge_rate" name="max_charge_rate" value="50.0">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="max_discharge_rate">Max Discharge Rate (A)</label>
                <input type="number" step="0.1" id="max_discharge_rate" name="max_discharge_rate" value="100.0">
            </div>
            <div class="form-group">
                <label for="operating_temp_min">Min Operating Temp (°C)</label>
                <input type="number" step="0.1" id="operating_temp_min" name="operating_temp_min" value="-10.0">
            </div>
        </div>

        <div class="form-group">
            <label for="operating_temp_max">Max Operating Temp (°C)</label>
            <input type="number" step="0.1" id="operating_temp_max" name="operating_temp_max" value="60.0">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Add Battery</button>
        <a href="{{ url_for('battery_selection') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
